<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lumen Music Player</title>
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <main class="player-shell">
      <section class="player-card">
        <div class="now-playing">
          <div class="cover-art" id="coverArt">♫</div>
          <div class="song-info">
            <p class="eyebrow">Now Playing</p>
            <h1 id="songTitle">Loading song...</h1>
            <p id="artistName">Artist</p>
            <div class="time-row">
              <span id="currentTime">0:00</span>
              <span id="totalTime">0:00</span>
            </div>
            <input id="progress" class="progress-bar" type="range" min="0" max="100" value="0" step="0.1" />
          </div>
        </div>

        <div class="controls">
          <button id="prevBtn" class="control-btn" aria-label="Previous song">⏮</button>
          <button id="playBtn" class="play-btn" aria-label="Play or pause">▶</button>
          <button id="nextBtn" class="control-btn" aria-label="Next song">⏭</button>
        </div>

        <div class="options-row">
          <label class="volume-control" for="volume">
            <span>🔊</span>
            <input id="volume" type="range" min="0" max="1" value="0.7" step="0.01" />
          </label>
          <label class="toggle-option" for="autoplayToggle">
            <input id="autoplayToggle" type="checkbox" />
            <span>Autoplay</span>
          </label>
        </div>

        <div class="playlist-section">
          <h2>Your Queue</h2>
          <ul id="playlist"></ul>
        </div>
      </section>
    </main>

    <audio id="audio" preload="metadata"></audio>
    <script src="script.js?v=3"></script>
  </body>
</html>
